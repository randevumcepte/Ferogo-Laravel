<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;box-sizing:border-box}
body{background:#000;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.cell{height:175px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 50% 0%,#1c1c1c,#000);border:1px solid #1c1c1c}
.lg{font-weight:900;letter-spacing:-2px;font-size:56px;display:flex;align-items:center}
.w{color:#fff}.g{color:#EDBA3E}
.xi{color:#EDBA3E;font-style:italic;display:inline-block}
.lbl{margin-top:16px;font-family:Arial;font-weight:400;font-size:12px;letter-spacing:2px;color:#8a8a8a}
.checker{background:conic-gradient(#141414 25%,#EDBA3E 0 50%,#141414 0 75%,#EDBA3E 0);background-size:.16em .16em}
.checkerwb{background:conic-gradient(#141414 25%,#fff 0 50%,#141414 0 75%,#fff 0);background-size:.16em .16em}
</style></head><body>
<div class="grid">

  <div class="cell">
    <div class="lg"><span class="w">FERI</span><span class="xi">X</span><span class="g">GO</span></div>
    <div class="lbl">1 · TEMIZ · sadece altin italik X (seritsiz)</div>
  </div>

  <div class="cell">
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="checker" style="width:5.6em;height:.16em;font-size:56px;margin-bottom:.06em;border-radius:2px"></div>
      <div class="lg"><span class="w">FERI</span><span class="xi">X</span><span class="g">GO</span></div>
    </div>
    <div class="lbl">2 · UST yatay damali serit (taksi tavani)</div>
  </div>

  <div class="cell">
    <div class="lg">
      <span class="checker" style="width:.82em;height:.82em;display:inline-block;margin-right:.14em;border-radius:3px"></span>
      <span class="w">FERI</span><span class="xi">X</span><span class="g">GO</span>
    </div>
    <div class="lbl">3 · SOL damali kare (ikon) + yazi</div>
  </div>

  <div class="cell">
    <div class="lg" style="align-items:stretch">
      <span class="w">FERI</span><span class="xi">X</span><span class="g">GO</span>
      <span class="checkerwb" style="width:.82em;height:.82em;display:inline-block;margin-left:.14em;border-radius:3px;align-self:center"></span>
    </div>
    <div class="lbl">4 · SAG damali kare (beyaz-siyah ikon)</div>
  </div>

  <div class="cell">
    <div style="display:flex;align-items:center;font-size:56px">
      <span class="checker" style="width:.5em;height:1em;display:inline-block;margin-right:.16em"></span>
      <div class="lg" style="font-size:1em"><span class="w">FERI</span><span class="xi">X</span><span class="g">GO</span></div>
    </div>
    <div class="lbl">5 · SOL dikey damali bant</div>
  </div>

  <div class="cell">
    <div class="lg"><span class="w">FERI</span><span class="xi">X</span><span class="w">GO</span></div>
    <div class="lbl">6 · TEMIZ · GO beyaz (seritsiz)</div>
  </div>

</div></body></html>
