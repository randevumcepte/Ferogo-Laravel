<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;box-sizing:border-box}
body{background:#000;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
.cell{height:132px;display:flex;align-items:center;justify-content:center;gap:26px;
  background:radial-gradient(120% 90% at 50% 0%,#1c1c1c,#000);border-bottom:1px solid #202020}
.tag{position:absolute;left:22px;font-family:Arial;font-weight:700;font-size:13px;letter-spacing:2px;color:#EDBA3E;width:30px}
.row{position:relative;width:100%;display:flex;align-items:center;justify-content:center}
.lg{font-weight:900;letter-spacing:-2px;font-size:58px;display:flex;align-items:center}
.w{color:#fff;font-style:italic;display:inline-block}
.gsolid{color:#EDBA3E;font-style:italic;display:inline-block}
.wsolid{color:#fff;font-style:italic;display:inline-block}
.bd{color:#fff;font-style:italic;display:inline-block;paint-order:stroke fill;-webkit-text-stroke:3px #EDBA3E}
.note{font-family:Arial;font-weight:400;font-size:12px;letter-spacing:1px;color:#8a8a8a;width:270px;text-align:left}
</style></head><body>

  <div class="cell"><div class="row"><span class="tag">A</span>
    <div class="lg"><span class="w">FERI</span><span class="gsolid">X</span><span class="gsolid">GO</span></div>
    <span class="note">X altın dolu · GO altın dolu</span></div></div>

  <div class="cell"><div class="row"><span class="tag">B</span>
    <div class="lg"><span class="w">FERI</span><span class="bd">X</span><span class="gsolid">GO</span></div>
    <span class="note">X beyaz+sarı border · GO altın dolu</span></div></div>

  <div class="cell"><div class="row"><span class="tag">C</span>
    <div class="lg"><span class="w">FERI</span><span class="bd">X</span><span class="bd">GO</span></div>
    <span class="note">X + GO beyaz+sarı border</span></div></div>

  <div class="cell"><div class="row"><span class="tag">D</span>
    <div class="lg"><span class="w">FERI</span><span class="gsolid">X</span><span class="bd">GO</span></div>
    <span class="note">X altın dolu · GO beyaz+sarı border</span></div></div>

  <div class="cell"><div class="row"><span class="tag">E</span>
    <div class="lg"><span class="w">FERI</span><span class="gsolid">X</span><span class="wsolid">GO</span></div>
    <span class="note">X altın dolu · GO beyaz dolu</span></div></div>

</body></html>
