<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;box-sizing:border-box}
body{background:#000;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
.grid{display:grid;grid-template-columns:1fr;gap:0}
.cell{height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;

.lg{font-weight:900;letter-spacing:-2px;font-size:58px;display:flex;align-items:center}
.w{color:#fff}.g{color:#EDBA3E}
.it{font-style:italic;display:inline-block}
.lbl{margin-top:14px;font-family:Arial;font-weight:400;font-size:12px;letter-spacing:2px;color:#8a8a8a}
</style></head><body>

  <div class="cell">
    <div class="lg"><span class="w it">FERI</span><span class="g it">X</span><span class="g">GO</span></div>
    <div class="lbl">1 · FERI + X egik · GO duz</div>
  </div>

  <div class="cell">
    <div class="lg"><span class="w it">FERI</span><span class="g it">X</span><span class="g it">GO</span></div>
    <div class="lbl">2 · TUMU EGIK (FERIXGO) — onerilen</div>
  </div>

  <div class="cell">
    <div class="lg"><span class="w it">FERI</span><span class="g it">X</span><span class="w it">GO</span></div>
    <div class="lbl">3 · TUMU EGIK · GO beyaz</div>
  </div>

</body></html>
