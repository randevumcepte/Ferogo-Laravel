<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .card{width:1200px;height:630px;position:relative;
    background:radial-gradient(120% 90% at 50% 0%,#1c1c1c,#000);
    font-family:"Arial Black","Segoe UI",Arial,sans-serif;color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px}
  .glow{position:absolute;inset:0;background:
    radial-gradient(40% 30% at 50% 18%,rgba(237,186,62,.18),transparent 60%)}
  .logo{font-weight:900;letter-spacing:-2px;display:flex;align-items:baseline;font-size:150px;z-index:1}
  .w{color:#fff}.g{color:#EDBA3E}
  .tag{z-index:1;font-family:Arial,sans-serif;font-weight:700;font-size:38px;letter-spacing:.5px;color:#e9e9e9}
  .sub{z-index:1;font-family:Arial,sans-serif;font-weight:400;font-size:26px;color:#9a9a9a;letter-spacing:2px}
  .pill{z-index:1;margin-top:6px;font-family:Arial,sans-serif;font-weight:700;font-size:22px;
    color:#EDBA3E;border:2px solid rgba(237,186,62,.4);background:rgba(237,186,62,.08);
    padding:10px 26px;border-radius:999px;letter-spacing:1px}
</style></head><body>
  <div class="card">
    <div class="glow"></div>
    <div class="logo"><span class="w">Fer</span><span class="g" style="font-size:183px;font-style:italic">X</span><span class="w">Go</span></div>
    <div class="tag">İzmir Paylaşımlı Yolculuk Platformu</div>
    <div class="sub">HAVALİMANI · ŞEHİR İÇİ · KURUMSAL</div>
    <div class="pill">Şeffaf katkı payı · 7/24 platform</div>
  </div>
</body></html>
