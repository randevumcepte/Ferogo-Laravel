<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;box-sizing:border-box}
body{background:#000;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
.cell{height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 50% 0%,#1c1c1c,#000);border-bottom:1px solid #202020}
.lg{font-weight:900;letter-spacing:-2px;font-size:60px;display:flex;align-items:center}
.w{color:#fff;font-style:italic;display:inline-block}
.gsolid{color:#EDBA3E;font-style:italic;display:inline-block}
.lbl{margin-top:14px;font-family:Arial;font-weight:400;font-size:12px;letter-spacing:2px;color:#8a8a8a}
/* ici sari + dis border beyaz */
.gw{color:#EDBA3E;font-style:italic;display:inline-block;paint-order:stroke fill}
.wb3{-webkit-text-stroke:3px #fff}
.wb4{-webkit-text-stroke:4px #fff}
</style></head><body>

  <div class="cell"><div class="lg"><span class="w">FERI</span><span class="gsolid">X</span><span class="gw wb3">GO</span></div><div class="lbl">F · X altın dolu · GO içi sarı + BEYAZ border</div></div>

  <div class="cell"><div class="lg"><span class="w">FERI</span><span class="gsolid">X</span><span class="gw wb4">GO</span></div><div class="lbl">F2 · aynısı · GO beyaz border KALIN</div></div>

  <div class="cell"><div class="lg"><span class="w">FERI</span><span class="gw wb3">X</span><span class="gw wb3">GO</span></div><div class="lbl">G · X + GO içi sarı · dış beyaz border (ikisi)</div></div>

</body></html>
