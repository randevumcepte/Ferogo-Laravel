<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  *{margin:0;box-sizing:border-box}

  .g{color:#EDBA3E}         /* altin */
  .lbl{font-family:Arial;font-weight:400;font-size:13px;letter-spacing:2px;color:#8a8a8a}
</style></head><body>

  <!-- FerXGo · Fer beyaz · X buyuk+egik altin · Go BEYAZ -->
  <div class="stage">
    <div class="lg" style="font-size:72px">
      <span class="w">Fer</span><span class="g" style="font-size:88px;font-style:italic">X</span><span class="w">Go</span>
    </div>
  </div>
  <div class="lbl">FerXGo · Fer beyaz · X altin egik · Go beyaz</div>

</body></html>
