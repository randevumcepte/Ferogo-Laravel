<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;box-sizing:border-box}
body{background:#000;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
.cell{height:130px;display:flex;align-items:center;background:radial-gradient(120% 90% at 50% 0%,#1c1c1c,#000);border-bottom:1px solid #202020;position:relative}
.tag{position:absolute;left:22px;font-family:Arial;font-weight:700;font-size:14px;letter-spacing:2px;color:#EDBA3E}
.mid{flex:1;display:flex;align-items:center;justify-content:center}
.lg{font-weight:900;letter-spacing:-2px;font-size:60px;display:flex;align-items:center}
.note{position:absolute;right:22px;font-family:Arial;font-weight:400;font-size:12px;letter-spacing:1px;color:#8a8a8a;width:210px;text-align:left}
.w{color:#fff;font-style:italic;display:inline-block}
.gsolid{color:#EDBA3E;font-style:italic;display:inline-block}
.wsolid{color:#fff;font-style:italic;display:inline-block}
.gb{color:#fff;font-style:italic;display:inline-block;paint-order:stroke fill;-webkit-text-stroke:3px #EDBA3E}
.gw{color:#EDBA3E;font-style:italic;display:inline-block;paint-order:stroke fill;-webkit-text-stroke:3px #fff}
</style></head><body>

  <div class="cell"><span class="tag">A</span><div class="mid"><div class="lg"><span class="w">FER</span><span class="gsolid">X</span><span class="gsolid">GO</span></div></div><span class="note">X+GO altın dolu</span></div>

  <div class="cell"><span class="tag">D</span><div class="mid"><div class="lg"><span class="w">FER</span><span class="gsolid">X</span><span class="gb">GO</span></div></div><span class="note">X altın · GO beyaz+sarı border</span></div>

  <div class="cell"><span class="tag">E</span><div class="mid"><div class="lg"><span class="w">FER</span><span class="gsolid">X</span><span class="wsolid">GO</span></div></div><span class="note">X altın · GO beyaz dolu</span></div>

  <div class="cell"><span class="tag">F</span><div class="mid"><div class="lg"><span class="w">FER</span><span class="gsolid">X</span><span class="gw">GO</span></div></div><span class="note">X altın · GO sarı+beyaz border</span></div>

  <div class="cell"><span class="tag">G</span><div class="mid"><div class="lg"><span class="w">FER</span><span class="gw">X</span><span class="gw">GO</span></div></div><span class="note">X+GO sarı+beyaz border</span></div>

</body></html>
