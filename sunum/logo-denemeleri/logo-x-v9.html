<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;box-sizing:border-box}
body{background:#000;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
.cell{height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 50% 0%,#1c1c1c,#000);border-bottom:1px solid #1c1c1c}
.lg{font-weight:900;letter-spacing:-2px;font-size:60px;display:flex;align-items:center}
.w{color:#fff;font-style:italic;display:inline-block}
.g{color:#EDBA3E;font-style:italic;display:inline-block}
.lbl{margin-top:14px;font-family:Arial;font-weight:400;font-size:12px;letter-spacing:2px;color:#8a8a8a}
/* X: beyaz dolu + sari border */
.xb{color:#fff;font-style:italic;display:inline-block;paint-order:stroke fill}
.t2{-webkit-text-stroke:2px #EDBA3E}
.t3{-webkit-text-stroke:3px #EDBA3E}
.t4{-webkit-text-stroke:4px #EDBA3E}
</style></head><body>

  <div class="cell"><div class="lg"><span class="w">FERI</span><span class="xb t2">X</span><span class="g">GO</span></div><div class="lbl">1 · X beyaz · ince sari border</div></div>

  <div class="cell"><div class="lg"><span class="w">FERI</span><span class="xb t3">X</span><span class="g">GO</span></div><div class="lbl">2 · X beyaz · orta sari border</div></div>

  <div class="cell"><div class="lg"><span class="w">FERI</span><span class="xb t4">X</span><span class="g">GO</span></div><div class="lbl">3 · X beyaz · kalin sari border</div></div>

</body></html>
