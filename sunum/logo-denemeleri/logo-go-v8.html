<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;box-sizing:border-box}
body{background:#000;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.cell{height:175px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 50% 0%,#1c1c1c,#000);border:1px solid #1c1c1c}
.lg{font-weight:900;letter-spacing:-2px;font-size:56px;display:flex;align-items:center}
.w{color:#fff}.it{font-style:italic;display:inline-block}
.x{color:#EDBA3E;font-style:italic;display:inline-block}
.lbl{margin-top:16px;font-family:Arial;font-weight:400;font-size:12px;letter-spacing:2px;color:#8a8a8a}

/* GO efektleri */
.go-neon{color:#FFD22E;font-style:italic;display:inline-block;text-shadow:0 0 16px rgba(255,200,20,.95),0 0 5px rgba(255,200,20,.8)}
.go-grad{font-style:italic;display:inline-block;background:linear-gradient(180deg,#FFE87A,#EDBA3E 55%,#B9860F);-webkit-background-clip:text;background-clip:text;color:transparent}
.go-out{color:transparent;font-style:italic;display:inline-block;-webkit-text-stroke:2.5px #EDBA3E}
.go-tag{font-style:italic;display:inline-block;background:linear-gradient(180deg,#F4CF52,#E0A82E);color:#141414;padding:.02em .14em .06em;border-radius:.14em;margin-left:.06em}
.go-3d{color:#EDBA3E;font-style:italic;display:inline-block;text-shadow:1px 1px 0 #9c7414,2px 2px 0 #8a6410,3px 3px 0 #6e5010,4px 4px 6px rgba(0,0,0,.5)}
.go-bright{color:#FFD400;font-style:italic;display:inline-block;text-shadow:0 0 2px rgba(255,212,0,.6)}
</style></head><body>
<div class="grid">

  <div class="cell"><div class="lg"><span class="w it">FERI</span><span class="x">X</span><span class="go-neon">GO</span></div><div class="lbl">1 · GO NEON (parlayan sari)</div></div>

  <div class="cell"><div class="lg"><span class="w it">FERI</span><span class="x">X</span><span class="go-grad">GO</span></div><div class="lbl">2 · GO DEGRADE (acik->koyu altin)</div></div>

  <div class="cell"><div class="lg"><span class="w it">FERI</span><span class="x">X</span><span class="go-out">GO</span></div><div class="lbl">3 · GO KONTUR (ici bos sari)</div></div>

  <div class="cell"><div class="lg"><span class="w it">FERI</span><span class="x">X</span><span class="go-tag">GO</span></div><div class="lbl">4 · GO ETIKET/BUTON (sari zemin, siyah)</div></div>

  <div class="cell"><div class="lg"><span class="w it">FERI</span><span class="x">X</span><span class="go-3d">GO</span></div><div class="lbl">5 · GO 3D golge</div></div>

  <div class="cell"><div class="lg"><span class="w it">FERI</span><span class="x">X</span><span class="go-bright">GO</span></div><div class="lbl">6 · GO PARLAK SARI (#FFD400)</div></div>

</div></body></html>
