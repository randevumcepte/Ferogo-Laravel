; PHP-FPM dosya yükleme limitleri (panel reklam görseli yüklemesi için).
; Bu dosya public/ altında olduğundan sadece web isteklerini etkiler.
; Not: Değişiklik PHP tarafında ~5 dk (user_ini.cache_ttl) içinde aktifleşir.
upload_max_filesize = 20M
post_max_size = 21M
memory_limit = 256M
max_execution_time = 120
max_input_time = 120
